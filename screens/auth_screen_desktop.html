            background: radial-gradient(circle at 50% 50%, rgba(124, 58, 237, 0.15) 0%, rgba(34, 211, 238, 0.05) 50%, transparent 100%);

            background-color: rgba(18, 18, 26, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);

<body class="bg-[#0A0A0F] text-on-surface font-body-lg text-body-lg min-h-screen flex flex-col relative overflow-x-hidden">
<!-- Atmospheric Depth Mesh Gradient -->
<div class="mesh-gradient-bg"></div>
<!-- 
      TopNavBar is SUPPRESSED here as per the "Destination" Rule. 
      This is a Linear/Transactional Login screen. 
    -->
<main class="flex-grow flex items-center justify-center p-md relative z-10 w-full max-w-container-max mx-auto">
<div class="glass-panel w-full max-w-md rounded-xl p-xl flex flex-col gap-lg">
<!-- Header -->
<div class="flex flex-col items-center text-center gap-sm mb-sm">
<div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center border border-outline-glass mb-sm">
<span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">terminal</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface">Welcome back</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Sign in to continue reviewing your code.</p>
</div>
<!-- Social Login -->
<div class="flex flex-col gap-md">
<button class="w-full bg-surface-container-highest hover:bg-surface-bright transition-colors border border-outline-glass rounded-lg py-sm px-md flex items-center justify-center gap-sm font-body-sm text-body-sm text-on-surface h-11">

</svg>

                </button>
<button class="w-full bg-surface-container-highest hover:bg-surface-bright transition-colors border border-outline-glass rounded-lg py-sm px-md flex items-center justify-center gap-sm font-body-sm text-body-sm text-on-surface h-11">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>

                </button>
</div>
<!-- Divider -->
<div class="flex items-center gap-sm">
<div class="h-px bg-outline-glass flex-grow"></div>
<span class="font-body-sm text-body-sm text-outline font-mono-code text-[11px] uppercase tracking-widest">or sign in with email</span>
<div class="h-px bg-outline-glass flex-grow"></div>
</div>
<!-- Form -->
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm text-on-surface-variant font-mono-code" for="email">Email address</label>
<div class="input-glow rounded-lg transition-shadow">
<input class="w-full bg-surface-container-lowest border border-outline-glass rounded-lg py-sm px-md font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:outline-none focus:ring-0 focus:border-secondary h-11" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-body-sm text-body-sm text-on-surface-variant font-mono-code" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot password?</a>
</div>
<div class="input-glow rounded-lg transition-shadow">
<input class="w-full bg-surface-container-lowest border border-outline-glass rounded-lg py-sm px-md font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:outline-none focus:ring-0 focus:border-secondary h-11" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<button class="w-full bg-primary-container hover:bg-inverse-primary text-white font-headline-md text-headline-md text-[16px] rounded-lg py-sm px-md h-12 transition-all mt-sm btn-glow" type="submit">
                    Sign In
                </button>
</form>
<!-- Footer Link -->
<div class="text-center mt-sm">
<span class="font-body-sm text-body-sm text-on-surface-variant">Don't have an account? </span>
<a class="font-body-sm text-body-sm text-primary font-bold hover:text-primary-fixed-dim transition-colors" href="#">Sign up</a>
</div>
</div>
</main>
<!-- Footer from JSON -->
<footer class="bg-transparent text-outline font-body-sm text-body-sm full-width bottom-0 flat no shadows flex flex-col md:flex-row justify-between items-center w-full px-lg py-xl max-w-container-max mx-auto relative z-10 border-t border-outline-glass mt-xl">
<div class="font-label-caps text-label-caps text-on-surface-variant mb-md md:mb-0">
            © 2024 CodeRefactor AI. Precision Engineering for Developers.
        </div>
<nav class="flex gap-lg">
<a class="text-outline hover:text-secondary-container transition-colors" href="#">Documentation</a>
<a class="text-outline hover:text-secondary-container transition-colors" href="#">Privacy</a>
<a class="text-outline hover:text-secondary-container transition-colors" href="#">Security</a>
<a class="text-outline hover:text-secondary-container transition-colors" href="#">Status</a>
